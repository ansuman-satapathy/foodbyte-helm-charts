apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: user-service
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: ./foodbyte-user-service
      sourceRef:
        kind: GitRepository
        name: foodbyte-flux
        namespace: flux-system
  valuesFiles: ["values.yaml", "values-prod.yaml"]
