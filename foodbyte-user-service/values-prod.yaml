# Production Overrides for AWS EKS (Full Self-Hosted)
replicaCount: 2

useSecrets: true

externalDatabase:
  enabled: false # Use the internal Helm-managed DBs but with persistence

# Secrets are injected via ExternalSecrets into a secret named 'user-service-secrets'
# Our deployment.yaml logic needs a small update to pull from this secret instead of values.yaml

imagePullSecrets:
  - name: ghcr-pull-secret

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
