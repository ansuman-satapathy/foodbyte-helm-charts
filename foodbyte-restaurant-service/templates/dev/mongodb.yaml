{{- if .Values.devMongo.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-db
spec:
  serviceName: {{ .Release.Name }}-db
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-db
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-db
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: {{ .Values.devMongo.user | quote }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              {{- if .Values.useSecrets }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "foodbyte-restaurant-service.fullname" . }}-secrets
                  key: mongo-password
              {{- else }}
              value: {{ .Values.devMongo.password | quote }}
              {{- end }}
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.devMongo.database | quote }}
          volumeMounts:
            - name: data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.devMongo.persistence.storageClass }}
        storageClassName: {{ .Values.devMongo.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.devMongo.persistence.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-db
spec:
  selector:
    app: {{ .Release.Name }}-db
  ports:
    - port: 27017
      targetPort: 27017
{{- end }}
