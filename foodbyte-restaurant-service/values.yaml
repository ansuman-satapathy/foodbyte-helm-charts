replicaCount: 1

image:
  repository: ghcr.io/ansuman-satapathy/foodbyte-restaurant-service
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8002

ingress:
  enabled: false
httpRoute:
  enabled: false

resources: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

autoscaling:
  enabled: false
volumes: []
volumeMounts: []
nodeSelector: {}
tolerations: []
affinity: {}

mongodb:
  enabled: true
  auth:
    rootPassword: admin_password
    username: user_admin
    password: user_pass
    database: restaurant_db
  architecture: standalone
  persistence:
    enabled: false

appConfig:
  jwtSecret: "your_jwt_secret"
  jwtAlgorithm: "HS256"
  jwtExpireMinutes: 60
