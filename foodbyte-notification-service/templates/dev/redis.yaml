{{- if .Values.devRedis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
spec:
  serviceName: {{ .Release.Name }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          {{- if .Values.devRedis.password }}
          args: ["--requirepass", {{ .Values.devRedis.password | quote }}]
          {{- end }}
          env:
            - name: REDIS_PASSWORD
              {{- if .Values.useSecrets }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "foodbyte-notification-service.fullname" . }}-secrets
                  key: redis-password
              {{- else }}
              value: {{ .Values.devRedis.password | quote }}
              {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.devRedis.persistence.storageClass }}
        storageClassName: {{ .Values.devRedis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.devRedis.persistence.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
spec:
  selector:
    app: {{ .Release.Name }}-redis
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
